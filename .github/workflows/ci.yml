name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-build:
    name: Linux build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Build library
        # Pulls clic, vss and gnatcoll from the community index; no sibling checkouts.
        run: alr --non-interactive build
